<!DOCTYPE html>
<html lang="bn">
 
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Member Form | Kanakpur Tarun Sangha</title>

<link rel="stylesheet" href="member-form.css">

</head>


<body>


<div class="member-form-box">


<img
src="123.png.png"
class="club-logo"
alt="Club Logo"
>


<h1>
কনকপুর তরুণ সংঘ
</h1>


<h2>
Member registration from
</h2>


<p class="form-info">

আপনার তথ্য সঠিকভাবে পূরণ করুন।
Admin অনুমোদন করার পরে আপনার নাম সদস্য তালিকায় যুক্ত হবে।

</p>



<form id="memberRequestForm">


<label>
👤 সদস্যের নাম
</label>

<input
type="text"
id="requestName"
placeholder="আপনার নাম লিখুন"
required
>



<label>
📞 মোবাইল নম্বর
</label>

<input
type="tel"
id="requestMobile"
placeholder="মোবাইল নম্বর লিখুন"
required
>



<label>
🩸 Blood Group
</label>

<select
id="requestBlood"
required
>

<option value="">
Blood Group নির্বাচন করুন
</option>

<option value="A+">A+</option>
<option value="A-">A-</option>

<option value="B+">B+</option>
<option value="B-">B-</option>

<option value="O+">O+</option>
<option value="O-">O-</option>

<option value="AB+">AB+</option>
<option value="AB-">AB-</option>

</select>



<label>
👔 সদস্যের পদ
</label>

<select
id="requestPosition"
required
>

<option value="">
পদ নির্বাচন করুন
</option>

<option value="General Member">
General Member
</option>

<option value="Volunteer">
Volunteer
</option>

</select>



<label>
📷 সদস্যের ছবি
</label>


<input
type="file"
id="requestPhoto"
accept="image/*"
hidden
required
>


<button
type="button"
id="choosePhotoBtn"
class="photo-btn"
>

📷 ছবি নির্বাচন করুন

</button>


<p id="photoName">

কোনো ছবি নির্বাচন করা হয়নি

</p>



<div
id="previewBox"
class="preview-box"
style="display:none"
>

<img
id="photoPreview"
alt="Preview"
>

</div>



<button
type="submit"
id="submitRequestBtn"
class="submit-btn"
>

📩 আবেদন Submit করুন

</button>


<p id="requestMessage"></p>


</form>


</div>



<script
type="module"
src="member-form.js">
</script>


</body>

</html>
